name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build
        run: pnpm run build
      
      - name: Create tarball
        run: |
          mkdir -p release
          cp package.json release/
          cp README.md release/
          cp -r dist release/
          cd release
          tar -czf ../label-sql-mapping-sdk-${{ github.ref_name }}.tar.gz .
      
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: label-sql-mapping-sdk-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
